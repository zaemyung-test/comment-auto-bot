name: Issue comment bot

on:
  issues:
    types: [opened, labeled]

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Add comment based on labels
        uses: actions/github-script@v6
        with:
          script: |
            const issue = context.payload.issue;
            const labels = (issue && issue.labels) ? issue.labels.map(l => l.name) : [];
            let comment = "Thank you for your contribution!";

            // If this is a labeled event, check the label that was just added first
            if (context.eventName === 'issues' && context.payload.action === 'labeled') {
              const labelName = context.payload.label ? context.payload.label.name : null;
              if (labelName === 'bug') {
                comment = "Thank you. We will fix it";
              } else if (labelName === 'feature') {
                comment = "Thank you, we will consider to include this feature.";
              } else {
                // Fallback to existing labels on the issue
                if (labels.includes('bug')) comment = "Thank you. We will fix it";
                else if (labels.includes('feature')) comment = "Thank you, we will consider to include this feature.";
              }
            } else {
              // For opened (or other) events, examine all labels on the issue
              if (labels.includes('bug')) comment = "Thank you. We will fix it";
              else if (labels.includes('feature')) comment = "Thank you, we will consider to include this feature.";
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment
            });
